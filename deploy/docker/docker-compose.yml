# =============================================================================
# SUSE AI Assistant — Docker Compose V2 Configuration
# openSUSE Leap 16 | 3 services: llm, embed, app
#
# Usage:
#   docker compose up -d        # Start all services
#   docker compose logs -f      # Follow logs
#   docker compose ps           # Check status
#   docker compose down         # Stop and remove
#   docker compose build        # Rebuild images
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # LLM Inference Service (Ollama)
  # ---------------------------------------------------------------------------
  llm:
    image: ollama/ollama:latest
    container_name: suse-ai-llm
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - llm-data:/root/.ollama
    networks:
      - suse-ai-net
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Embedding Service
  # ---------------------------------------------------------------------------
  embed:
    build:
      context: .
      dockerfile: Dockerfile.embed
    container_name: suse-ai-embed
    restart: unless-stopped
    ports:
      - "11435:11435"
    environment:
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
      - EMBED_PORT=11435
      - LOG_LEVEL=info
    volumes:
      - embed-data:/app/data
      - embed-cache:/app/cache
    networks:
      - suse-ai-net
    depends_on:
      llm:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:11435/health || exit 1"]
      interval: 20s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # SUSE AI Assistant Application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: suse-ai-app
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8090
      - LLM_BASE_URL=http://llm:11434
      - EMBED_BASE_URL=http://embed:11435
      - DATABASE_PATH=/app/data/suse-ai.db
      - CACHE_DIR=/app/cache
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SUSE_AI_SECRET_KEY=${SUSE_AI_SECRET_KEY:?Set SUSE_AI_SECRET_KEY in .env}
    volumes:
      - app-data:/app/data
      - app-cache:/app/cache
      - app-config:/app/config:ro
    networks:
      - suse-ai-net
    depends_on:
      llm:
        condition: service_healthy
      embed:
        condition: service_healthy
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=100m
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8090/health || exit 1"]
      interval: 20s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  suse-ai-net:
    name: suse-ai-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  llm-data:
    name: suse-ai-llm-data
    driver: local
  embed-data:
    name: suse-ai-embed-data
    driver: local
  embed-cache:
    name: suse-ai-embed-cache
    driver: local
  app-data:
    name: suse-ai-app-data
    driver: local
  app-cache:
    name: suse-ai-app-cache
    driver: local
  app-config:
    name: suse-ai-app-config
    driver: local
