apiVersion: v1
kind: Service
metadata:
  name: ai-assistant
  namespace: ai-assistant
  labels:
    app.kubernetes.io/name: ai-assistant
    app.kubernetes.io/component: backend
    app: ai-assistant
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app: ai-assistant
    app.kubernetes.io/name: ai-assistant
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
      appProtocol: http
    - name: metrics
      port: 8080
      targetPort: metrics
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: ai-assistant-external
  namespace: ai-assistant
  labels:
    app.kubernetes.io/name: ai-assistant
    app.kubernetes.io/component: backend
    app: ai-assistant
    access: external
spec:
  type: NodePort
  selector:
    app: ai-assistant
    app.kubernetes.io/name: ai-assistant
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30080
      protocol: TCP
      appProtocol: http
