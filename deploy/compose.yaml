---
# =============================================================================
# openSUSE AI Assistant - compose.yaml
# Compatible with: podman compose (built-in) AND docker compose (V2)
# Usage: podman compose up -d
#    OR: docker compose up -d
# =============================================================================
services:
  llm:
    build:
      context: .
      dockerfile: Containerfile
    image: suse-ai:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /var/lib/suse-ai/models:/models:ro
    command:
      - python3.13
      - -m
      - src.core.llm_server
      - --model
      - /models/LFM2.5-1.2B-Instruct-Q4_K_M.gguf
      - --port
      - "8080"
      - --threads
      - "4"
      - --ctx-size
      - "8192"
      - --mmap
      - --n-gpu-layers
      - "0"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/v1/models"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Containerfile
    image: suse-ai:latest
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - /var/lib/suse-ai:/data:rw
    environment:
      - LLM_BASE_URL=http://llm:8080/v1
      - CONFIG_PATH=/data/state/config.yaml
      - RAG_CACHE_DIR=/data/cache/docs
    command:
      - python3.13
      - -m
      - src.ui.textual_tui
    depends_on:
      llm:
        condition: service_healthy

