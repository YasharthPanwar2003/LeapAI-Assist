# =============================================================================
# Rancher Cluster Registration Manifest
# =============================================================================
# This manifest registers an existing Kubernetes cluster with SUSE Rancher Prime.
# It deploys the rancher-agent that connects the downstream cluster to Rancher.
#
# IMPORTANT: The actual clusterRegistrationToken and agent manifest are
# dynamically generated by Rancher. This file shows the STRUCTURE of the
# registration manifest for reference.
#
# To register a cluster in Rancher:
#   1. Open Rancher UI → Cluster Management → Register Existing Cluster
#   2. Choose "Generic" or specific provider
#   3. Copy the generated kubectl command
#   4. Run it on the target cluster
#
# Reference: https://rancher.com/docs/rancher/v2.6/en/cluster-provisioning/registered-clusters/
# =============================================================================

---
# =============================================================================
# Namespace: cattle-system
# =============================================================================
# Rancher creates all resources in the cattle-system namespace
apiVersion: v1
kind: Namespace
metadata:
  name: cattle-system

---
# =============================================================================
# ClusterRole: cattle-admin (granted to rancher-agent)
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cattle-admin
  annotations:
    # RBAC rules for the rancher-agent
    rbac.authorization.kubernetes.io/autoupdate: "true"
rules:
  # Cluster-level permissions
  - apiGroups:
      - "*"
    resources:
      - "*"
    verbs:
      - "*"
  # Non-resource URLs
  - nonResourceURLs:
      - "*"
    verbs:
      - "*"

---
# =============================================================================
# ClusterRoleBinding: cattle-admin binding
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cattle-admin-binding
  annotations:
    rbac.authorization.kubernetes.io/autoupdate: "true"
subjects:
  - kind: ServiceAccount
    name: cattle
    namespace: cattle-system
roleRef:
  kind: ClusterRole
  name: cattle-admin
  apiGroup: rbac.authorization.k8s.io

---
# =============================================================================
# ServiceAccount: cattle (for rancher-agent)
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cattle

---
# =============================================================================
# Secret: cattle-credentials (cluster registration token)
# =============================================================================
# This secret stores the registration token that authenticates the agent
# with the Rancher server. It is generated by Rancher during registration.
#
# SECURITY NOTE: The actual token value is sensitive. Rotate tokens
# periodically by re-registering the cluster.
apiVersion: v1
kind: Secret
metadata:
  name: cattle-credentials
  namespace: cattle-system
type: Opaque
data:
  # Base64-encoded JSON with connection details
  # (This is a placeholder — Rancher generates the actual value)
  url: "BASE64_ENCODED_RANCHER_URL"       # e.g., https://rancher.mydomain.com
  token: "BASE64_ENCODED_CLUSTER_TOKEN"    # Generated by Rancher
  namespace: "BASE64_ENCODED_CLUSTER_NS"  # e.g., cattle-global-data
  caCert: "BASE64_ENCODED_CA_CERTIFICATE" # Rancher's CA certificate

---
# =============================================================================
# Deployment: cattle-cluster-agent
# =============================================================================
# The cluster agent runs on the downstream cluster and communicates with
# the Rancher server for cluster management, workload deployment, and monitoring.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cattle-cluster-agent
  namespace: cattle-system
  labels:
    app: cattle-cluster-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cattle-cluster-agent
  template:
    metadata:
      labels:
        app: cattle-cluster-agent
    spec:
      serviceAccountName: cattle
      containers:
        - name: cluster-register
          image: rancher/rancher-agent:v2.10.3
          imagePullPolicy: IfNotPresent
          env:
            - name: CATTLE_SERVER
              value: "https://rancher.mydomain.com"
            - name: CATTLE_CLUSTER_CHECK_INTERVAL
              value: "5s"
            - name: CATTLE_KUBECONFIG_CONTENT
              valueFrom:
                secretKeyRef:
                  name: cattle-credentials
                  key: kubeconfig
          args:
            - "--server=https://rancher.mydomain.com"
            - "--token=$(CATTLE_CLUSTER_TOKEN)"
            - "--ca-checksum=$(CATTLE_CA_CHECKSUM)"
            - "--cluster-name=my-cluster"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

---
# =============================================================================
# DaemonSet: cattle-node-agent (optional, for node-level management)
# =============================================================================
# The node agent runs on every node and handles:
# - Node labels and annotations
# - Cluster-level agent deployment
# - WinSWARM integration (Windows nodes)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cattle-node-agent
  namespace: cattle-system
  labels:
    app: cattle-node-agent
spec:
  selector:
    matchLabels:
      app: cattle-node-agent
  template:
    metadata:
      labels:
        app: cattle-node-agent
    spec:
      serviceAccountName: cattle
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: cattle-node-agent
          image: rancher/rancher-agent:v2.10.3
          imagePullPolicy: IfNotPresent
          env:
            - name: CATTLE_SERVER
              value: "https://rancher.mydomain.com"
            - name: CATTLE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cattle-credentials
                  key: token
          args:
            - "--server=https://rancher.mydomain.com"
            - "--token=$(CATTLE_TOKEN)"
            - "--role=agent"
            - "--ca-checksum=$(CATTLE_CA_CHECKSUM)"
          volumeMounts:
            - name: cattle-credentials
              mountPath: /etc/cattle/credentials
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: cattle-credentials
          secret:
            secretName: cattle-credentials

---
# =============================================================================
# HOW TO REGISTER A CLUSTER (Step-by-Step)
# =============================================================================

# Step 1: Ensure the downstream cluster is running
#   kubectl get nodes

# Step 2: Login to Rancher and generate a registration command
#   Rancher UI → Cluster Management → Register Existing Cluster → Generic
#   Copy the generated kubectl apply command

# Step 3: Apply the registration manifest on the downstream cluster
#   kubectl apply -f <rancher-generated-manifest.yaml>

# Step 4: Verify the agent is running
#   kubectl get pods -n cattle-system
#   # Expected output:
#   # NAME                      READY   STATUS    RESTARTS   AGE
#   # cattle-cluster-agent-xxx  1/1     Running   0          2m

# Step 5: In Rancher UI, the cluster should appear as "Active"

# =============================================================================
# RKE2/K3s Quick Registration (Alternative: CLI-based)
# =============================================================================

# For RKE2 or K3s clusters managed by Rancher, use the rancher-system-agent:
#
# 1. Install rancher-system-agent on each node:
#    curl -fL https://rancher-metadata.s3.amazonaws.com/system-agent/v0.3.5/rancher-system-agent-amd64.rpm \
#      -o rancher-system-agent.rpm
#    sudo zypper install rancher-system-agent.rpm
#
# 2. Register the agent:
#    sudo rancher-system-agent register \
#      --server https://rancher.mydomain.com \
#      --token <registration-token> \
#      --cluster-name my-cluster \
#      --role cluster \
#      --ca-checksum <sha256-checksum>

# =============================================================================
# Registration Troubleshooting
# =============================================================================

# Agent not connecting?
#   kubectl logs -n cattle-system -l app=cattle-cluster-agent --tail=50

# Certificate errors?
#   - Ensure the Rancher CA is trusted
#   - Check the ca-checksum matches
#   - Verify clock sync between cluster and Rancher server

# Cluster stuck in "Provisioning"?
#   - Check agent logs: kubectl logs -n cattle-system -l app=cattle-cluster-agent
#   - Verify Rancher server is reachable from the cluster
#   - Check firewall rules (port 443 outbound)

# Re-register a cluster:
#   1. Delete all Rancher resources: kubectl delete namespace cattle-system
#   2. Generate a new registration token in Rancher UI
#   3. Re-apply the new manifest
