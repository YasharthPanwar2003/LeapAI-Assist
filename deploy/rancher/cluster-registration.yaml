---
# =============================================================================
# Rancher Cluster Registration Manifest
# =============================================================================
# Reference:
#   https://rancher.com/docs/rancher/v2.6/en/cluster-provisioning/
#   registered-clusters/
# =============================================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: cattle-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cattle-admin
  annotations:
    rbac.authorization.kubernetes.io/autoupdate: "true"
rules:
  - apiGroups:
      - "*"
    resources:
      - "*"
    verbs:
      - "*"
  - nonResourceURLs:
      - "*"
    verbs:
      - "*"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cattle-admin-binding
  annotations:
    rbac.authorization.kubernetes.io/autoupdate: "true"
subjects:
  - kind: ServiceAccount
    name: cattle
    namespace: cattle-system
roleRef:
  kind: ClusterRole
  name: cattle-admin
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cattle
  namespace: cattle-system

---
# SECURITY NOTE: Rotate tokens periodically by re-registering the cluster.
apiVersion: v1
kind: Secret
metadata:
  name: cattle-credentials
  namespace: cattle-system
type: Opaque
data:
  url: "BASE64_ENCODED_RANCHER_URL"
  token: "BASE64_ENCODED_CLUSTER_TOKEN"
  namespace: "BASE64_ENCODED_CLUSTER_NS"
  caCert: "BASE64_ENCODED_CA_CERTIFICATE"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cattle-cluster-agent
  namespace: cattle-system
  labels:
    app: cattle-cluster-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cattle-cluster-agent
  template:
    metadata:
      labels:
        app: cattle-cluster-agent
    spec:
      serviceAccountName: cattle
      containers:
        - name: cluster-register
          image: rancher/rancher-agent:v2.10.3
          imagePullPolicy: IfNotPresent
          env:
            - name: CATTLE_SERVER
              value: "https://rancher.mydomain.com"
            - name: CATTLE_CLUSTER_CHECK_INTERVAL
              value: "5s"
            - name: CATTLE_KUBECONFIG_CONTENT
              valueFrom:
                secretKeyRef:
                  name: cattle-credentials
                  key: kubeconfig
          args:
            - "--server=https://rancher.mydomain.com"
            - "--token=$(CATTLE_CLUSTER_TOKEN)"
            - "--ca-checksum=$(CATTLE_CA_CHECKSUM)"
            - "--cluster-name=my-cluster"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cattle-node-agent
  namespace: cattle-system
  labels:
    app: cattle-node-agent
spec:
  selector:
    matchLabels:
      app: cattle-node-agent
  template:
    metadata:
      labels:
        app: cattle-node-agent
    spec:
      serviceAccountName: cattle
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: cattle-node-agent
          image: rancher/rancher-agent:v2.10.3
          imagePullPolicy: IfNotPresent
          env:
            - name: CATTLE_SERVER
              value: "https://rancher.mydomain.com"
            - name: CATTLE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cattle-credentials
                  key: token
          args:
            - "--server=https://rancher.mydomain.com"
            - "--token=$(CATTLE_TOKEN)"
            - "--role=agent"
            - "--ca-checksum=$(CATTLE_CA_CHECKSUM)"
          volumeMounts:
            - name: cattle-credentials
              mountPath: /etc/cattle/credentials
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: cattle-credentials
          secret:
            secretName: cattle-credentials
