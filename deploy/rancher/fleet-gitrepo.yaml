---
# =============================================================================
# Fleet GitRepo Resource Example
# =============================================================================
# Apply: kubectl apply -f fleet-gitrepo.yaml
# Fleet namespace: fleet-default (default for Fleet resources)
# Reference: https://fleet.rancher.io/gitrepo-resources/
# =============================================================================

apiVersion: fleet.cattle.io/v1alpha1
kind: GitRepo
metadata:
  name: my-workloads
  namespace: fleet-default
  labels:
    app.kubernetes.io/part-of: "fleet-demo"
    environment: "production"
  annotations:
    fleet.cattle.io/reconcile-rate: "5m"
spec:
  # -----------------------------------------------------------------------
  # Git Repository Source
  # -----------------------------------------------------------------------
  repo: "https://github.com/myorg/my-k8s-manifests.git"
  branch: "main"
  paths:
    - "./manifests/base"
    - "./charts"

  # -----------------------------------------------------------------------
  # Git Authentication (optional - uncomment for private repos)
  # -----------------------------------------------------------------------
  # clientSecretName: git-auth

  # -----------------------------------------------------------------------
  # Helm Chart Support
  # -----------------------------------------------------------------------
  helmRepoURL: ""
  helmSecretName: ""

  # -----------------------------------------------------------------------
  # Target Cluster Selection
  # -----------------------------------------------------------------------
  targets:
    - clusterSelector:
        matchLabels:
          fleet.cattle.io/managed: "true"

  # -----------------------------------------------------------------------
  # Sync Options
  # -----------------------------------------------------------------------
  syncOptions:
    - CreateNamespace=true
    - Prune=true

  correctDrift: false

---
# =============================================================================
# Production Apps GitRepo
# =============================================================================
apiVersion: fleet.cattle.io/v1alpha1
kind: GitRepo
metadata:
  name: production-apps
  namespace: fleet-default
spec:
  repo: "https://github.com/myorg/my-k8s-apps.git"
  branch: "main"
  paths:
    - "./overlays/production"
  targets:
    - clusterSelector:
        matchLabels:
          environment: production
  syncOptions:
    - CreateNamespace=true
    - Prune=true

---
# =============================================================================
# Staging Apps GitRepo
# =============================================================================
apiVersion: fleet.cattle.io/v1alpha1
kind: GitRepo
metadata:
  name: staging-apps
  namespace: fleet-default
spec:
  repo: "https://github.com/myorg/my-k8s-apps.git"
  branch: "main"
  paths:
    - "./overlays/staging"
  targets:
    - clusterSelector:
        matchLabels:
          environment: staging
  syncOptions:
    - CreateNamespace=true
    - Prune=false
